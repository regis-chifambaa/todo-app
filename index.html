<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do App</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <header>
            <h1>My To-Do List</h1>
            <p class="task-counter" id="taskCounter">0 tasks remaining</p>
        </header>

        <div class="input-section">
            <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
            <button id="addBtn" onclick="addTask()">Add</button>
        </div>

        <div class="filters">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="active">Active</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <ul id="taskList"></ul>

        <div class="empty-state" id="emptyState">
            <span>✓</span>
            <p>No tasks here, Add one above.</p>
        </div>

        <div class="list-footer" id="listFooter" style="display:none;">
            <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
